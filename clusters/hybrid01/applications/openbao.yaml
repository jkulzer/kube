apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openbao
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
  destination:
    server: https://kubernetes.default.svc
    namespace: openbao
  project: default
  source:
    path: clusters/hybrid01/config/openbao
    repoURL: https://github.com/jkulzer/kube
    targetRevision: HEAD
