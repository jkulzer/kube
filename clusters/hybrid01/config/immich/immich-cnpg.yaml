---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: immich-pg
  namespace: immich
spec:
  instances: 1
  enableSuperuserAccess: true
  postgresql:
    shared_preload_libraries:
      - "vchord.so"
  imageName: ghcr.io/tensorchord/cloudnative-vectorchord:16.9-0.4.3
  bootstrap:
    initdb:
      database: immich
      owner: immich
      postInitSQL:
        - CREATE EXTENSION IF NOT EXISTS vchord CASCADE;
        - ALTER USER immich WITH SUPERUSER
  storage:
    size: 10Gi
  backup:
    retentionPolicy: "7d"
    barmanObjectStore:
      destinationPath: s3://cnpg-prod/immich/immich-pg
      endpointURL: https://s3.eu-central-1.idrivee2.com
      s3Credentials:
        accessKeyId:
          name: cnpg-backup-credentials
          key: access-key-id
        secretAccessKey:
          name: cnpg-backup-credentials
          key: access-key-secret
  monitoring:
    enablePodMonitor: true
