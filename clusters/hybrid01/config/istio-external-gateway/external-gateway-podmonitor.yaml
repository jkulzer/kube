apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: istio-external-gateway
  namespace: istio-external-gateway
spec:
  namespaceSelector:
    matchNames:
      - istio-external-gateway
  podMetricsEndpoints:
  - path: /stats/prometheus
    port: http-envoy-prom
    honorLabels: true
  selector:
    matchLabels:
      app: gateway
