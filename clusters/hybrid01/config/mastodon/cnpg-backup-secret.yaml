  access-key-id: dmF1bHQ6a3Z2Mi9kYXRhL2NucGcjYWNjZXNzLWtleS1pZA==
  # vault:kvv2/data/cnpg#access-key-secret
  access-key-secret: dmF1bHQ6a3Z2Mi9kYXRhL2NucGcjYWNjZXNzLWtleS1zZWNyZXQ=
