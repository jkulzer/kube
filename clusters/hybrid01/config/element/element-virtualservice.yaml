---
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: element-external
  namespace: element
spec:
  hosts:
  - "element.justmeowing.net"
  gateways:
  - istio-external-gateway/external-gateway
  http:
  - route:
    - destination:
        host: element
        port:
          number: 80
