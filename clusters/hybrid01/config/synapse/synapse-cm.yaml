---
apiVersion: v1
kind: ConfigMap
metadata:
  name: synapse
  namespace: synapse
  annotations:
    vault.security.banzaicloud.io/vault-addr: "http://openbao.openbao.svc.cluster.local:8200" # optional, the address of the Vault service, default values is https://vault:8200
    vault.security.banzaicloud.io/vault-role: "default" # optional, the default value is the name of the ServiceAccount the Pod runs in, in case of Secrets and ConfigMaps it is "default"
data:
  homeserver.yaml: |-
    public_baseurl: "https://justmeowing.net"
    server_name: "justmeowing.net"
    listeners:
      - port: 8008
        tls: false
        type: http
        x_forwarded: true
        bind_addresses: ['0.0.0.0']
        resources:
          - names: [client, federation]
            compress: false
    log_config: "/data/justmeowing.log.config"
    media_store_path: /storage/media_store
    report_stats: false
    signing_key_path: "/keys/justmeowing.signing.key"
    enable_registration: false
    enable_metrics: true
    password_config:
      enabled: false
    matrix_authentication_service:
      enabled: true
      endpoint: https://matrixauth.justmeowing.net
      secret: ${vault:kvv2/data/synapse#mas-secret}
  justmeowing.log.config: |-
    version: 1
    formatters:
      precise:
        format: '%(asctime)s - %(name)s - %(lineno)d - %(levelname)s - %(request)s - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: precise
    loggers:
        synapse.storage.SQL:
            # beware: increasing this to DEBUG will make synapse log sensitive
            # information such as access tokens.
            level: INFO
    root:
        level: INFO
        handlers: [console]
    disable_existing_loggers: false
