---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
  - name: openbao
    releaseName: openbao
    namespace: openbao
    repo: https://openbao.github.io/openbao-helm
    version: 0.28.3
    valuesFile: values.yaml

resources:
  - openbao-ns.yaml
  - openbao-virtualservice.yaml
  - openbao-backup.yaml
  - volsync-secret.yaml
