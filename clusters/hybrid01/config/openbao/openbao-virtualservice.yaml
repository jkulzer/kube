---
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: openbao-external
  namespace: openbao
spec:
  hosts:
  - "openbao.jkulzer.dev"
  gateways:
  - istio-external-gateway/external-gateway
  http:
    - route:
      - destination:
          host: openbao-ui
          port:
            number: 8200
